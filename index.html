<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perioperative Anticoagulation Manager</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .step-indicator {
            transition: all 0.3s ease;
        }
        
        .step-indicator.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.05);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
        }
        
        .risk-low { border-left: 4px solid #10b981; }
        .risk-moderate { border-left: 4px solid #f59e0b; }
        .risk-high { border-left: 4px solid #ef4444; }
        
        .timeline-item {
            position: relative;
            padding-left: 2rem;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.5rem;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #667eea;
        }
        
        .timeline-item::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 1.25rem;
            width: 2px;
            height: calc(100% - 1rem);
            background: #e5e7eb;
        }
        
        .timeline-item:last-child::after {
            display: none;
        }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .animate-pulse-soft {
            animation: pulse-soft 2s infinite;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Icons
        const HeartIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        );
        
        const AlertIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
        );
        
        const CheckIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        );
        
        const ClockIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        );
        
        const PillIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
        );

        // Data Models based on document and latest guidelines
        const anticoagulants = {
            warfarin: {
                name: "Warfarin (VKA)",
                halfLife: "20-60 hours",
                preopHighRisk: "Stop 5 days before (target INR <1.5)",
                preopLowRisk: "Stop 5 days before (target INR <1.5)",
                postopResume: "Resume 12-24 hours after surgery when hemostasis secured",
                bridgingRecommended: true,
                color: "blue"
            },
            apixaban: {
                name: "Apixaban (Eliquis)",
                halfLife: "~12 hours",
                preopHighRisk: "Stop 2 days before (48 hours)",
                preopLowRisk: "Stop 1 day before (24 hours)",
                postopResume: "Resume 1-2 days after low risk, 2-3 days after high risk",
                bridgingRecommended: false,
                color: "indigo",
                doseAdjustment: "No adjustment needed for renal function >30"
            },
            rivaroxaban: {
                name: "Rivaroxaban (Xarelto)",
                halfLife: "~11 hours (young), ~13 hours (elderly)",
                preopHighRisk: "Stop 2 days before (48 hours)",
                preopLowRisk: "Stop 1 day before (24 hours)",
                postopResume: "Resume 1-2 days after low risk, 2-3 days after high risk",
                bridgingRecommended: false,
                color: "purple"
            },
            dabigatran: {
                name: "Dabigatran (Pradaxa)",
                halfLife: "~14 hours (CrCl >80), ~18 hours (CrCl 50-80), ~28 hours (CrCl 30-50)",
                preopHighRisk: "Stop 2-4 days before (CrCl >50: 2 days, CrCl 30-50: 4 days)",
                preopLowRisk: "Stop 1-2 days before (CrCl >50: 1 day, CrCl 30-50: 2 days)",
                postopResume: "Resume 1-2 days after low risk, 2-3 days after high risk",
                bridgingRecommended: false,
                color: "pink",
                renalDependent: true
            },
            edoxaban: {
                name: "Edoxaban (Lixiana/Savaysa)",
                halfLife: "~10-14 hours",
                preopHighRisk: "Stop 2 days before (48 hours)",
                preopLowRisk: "Stop 1 day before (24 hours)",
                postopResume: "Resume 1-2 days after low risk, 2-3 days after high risk",
                bridgingRecommended: false,
                color: "teal"
            }
        };

        const bleedingRiskProcedures = {
            minimal: [
                "Dental procedures (extraction, cleaning)",
                "Skin biopsy/dermatologic procedures",
                "Cataract surgery",
                "Pacemaker/ICD implantation (low risk)",
                "Colonoscopy without polypectomy",
                "Superficial lymph node biopsy"
            ],
            low: [
                "Cholecystectomy (laparoscopic)",
                "Inguinal hernia repair",
                "Carpal tunnel release",
                "Arthroscopy",
                "Colonoscopy with polypectomy",
                "Abdominal hysterectomy",
                "Breast surgery"
            ],
            high: [
                "Cardiac surgery (CABG, valve replacement)",
                "Major cancer surgery",
                "Joint replacement (hip/knee)",
                "Neurosurgery (intracranial)",
                "Spinal surgery with neuraxial anesthesia",
                "Kidney biopsy",
                "Procedures >45 minutes duration"
            ]
        };

        const thromboembolicRiskFactors = {
            atrialFibrillation: {
                name: "Atrial Fibrillation",
                calculateScore: (age, hypertension, diabetes, stroke, heartFailure, vascular) => {
                    let score = 0;
                    if (age >= 75) score += 2;
                    else if (age >= 65) score += 1;
                    if (hypertension) score += 1;
                    if (diabetes) score += 1;
                    if (stroke) score += 2;
                    if (heartFailure) score += 1;
                    if (vascular) score += 1;
                    return score;
                },
                riskLevels: {
                    low: { score: 0, risk: "Low", annualRisk: "0%", bridging: false },
                    moderate: { score: "1-2", risk: "Moderate", annualRisk: "2.2%", bridging: false },
                    high: { score: "≥3", risk: "High", annualRisk: "4-5%", bridging: "Consider if mechanical valve or recent stroke" }
                }
            },
            vte: {
                name: "Venous Thromboembolism (DVT/PE)",
                riskLevels: {
                    recent: { period: "<3 months", risk: "High", bridging: true, delaySurgery: true },
                    intermediate: { period: "3-12 months", risk: "Moderate", bridging: false },
                    remote: { period: ">12 months", risk: "Low", bridging: false }
                }
            },
            mechanicalValve: {
                name: "Mechanical Heart Valve",
                riskLevels: {
                    mitral: { location: "Mitral", risk: "High", bridging: true },
                    aorticOld: { location: "Aortic (ball-cage)", risk: "High", bridging: true },
                    aorticModern: { location: "Aortic (bileaflet) + no AF", risk: "Moderate", bridging: "Consider if additional risk factors" }
                }
            }
        };

        const App = () => {
            const [currentStep, setCurrentStep] = useState(1);
            const [patientData, setPatientData] = useState({
                anticoagulant: '',
                indication: '',
                age: '',
                weight: '',
                creatinine: '',
                gender: 'male',
                hypertension: false,
                diabetes: false,
                stroke: false,
                heartFailure: false,
                vascular: false,
                vteTime: '',
                valveType: '',
                procedure: '',
                procedureUrgency: 'elective',
                bleedingRisk: '',
                neuraxial: false
            });
            const [recommendations, setRecommendations] = useState(null);

            const updatePatientData = (key, value) => {
                setPatientData(prev => ({ ...prev, [key]: value }));
            };

            const calculateCHA2DS2VASc = () => {
                let score = 0;
                if (patientData.age >= 75) score += 2;
                else if (patientData.age >= 65) score += 1;
                if (patientData.hypertension) score += 1;
                if (patientData.diabetes) score += 1;
                if (patientData.stroke) score += 2;
                if (patientData.heartFailure) score += 1;
                if (patientData.vascular) score += 1;
                if (patientData.gender === 'female') score += 1;
                return score;
            };

            const calculateCockcroftGault = () => {
                if (!patientData.creatinine || !patientData.age || !patientData.weight) return null;
                const creatinine = parseFloat(patientData.creatinine);
                const age = parseFloat(patientData.age);
                const weight = parseFloat(patientData.weight);
                
                let crcl = ((140 - age) * weight) / (72 * creatinine);
                if (patientData.gender === 'female') crcl *= 0.85;
                return Math.round(crcl);
            };

            const generateRecommendations = () => {
                const crcl = calculateCockcroftGault();
                const chads = calculateCHA2DS2VASc();
                const drug = anticoagulants[patientData.anticoagulant];
                
                let thromboembolicRisk = "low";
                let bridging = false;
                let delayRecommended = false;
                
                // Determine thromboembolic risk
                if (patientData.indication === 'afib') {
                    if (chads >= 4) thromboembolicRisk = "high";
                    else if (chads >= 2) thromboembolicRisk = "moderate";
                    
                    // Bridging only for very high risk per 2022 CHEST/2024 AHA
                    if (patientData.stroke && patientData.strokeRecent) {
                        bridging = true;
                    }
                } else if (patientData.indication === 'vte') {
                    if (patientData.vteTime === '<3months') {
                        thromboembolicRisk = "high";
                        delayRecommended = true;
                    } else if (patientData.vteTime === '3-12months') {
                        thromboembolicRisk = "moderate";
                    }
                } else if (patientData.indication === 'valve') {
                    if (patientData.valveType === 'mitral' || patientData.valveType === 'aorticOld') {
                        thromboembolicRisk = "high";
                        bridging = true;
                    } else if (patientData.valveType === 'aorticModern') {
                        thromboembolicRisk = "moderate";
                    }
                }

                // Adjust for neuraxial - requires longer interruption
                let preopDays = patientData.bleedingRisk === 'high' ? 2 : 1;
                if (patientData.neuraxial) {
                    preopDays = patientData.anticoagulant === 'dabigatran' ? 4 : 3;
                }
                
                // Dabigatran renal adjustment
                if (patientData.anticoagulant === 'dabigatran' && crcl && crcl < 50) {
                    preopDays += 2;
                }

                const rec = {
                    drug: drug,
                    thromboembolicRisk,
                    bridging,
                    delayRecommended,
                    chads,
                    crcl,
                    preopDays,
                    postopDays: patientData.bleedingRisk === 'high' ? "2-3 days" : "1-2 days",
                    procedureRisk: patientData.bleedingRisk,
                    neuraxial: patientData.neuraxial,
                    specificInstructions: []
                };

                // Generate specific instructions
                if (patientData.anticoagulant === 'warfarin') {
                    rec.specificInstructions.push("Stop warfarin 5 days preoperatively (last dose on day -5)");
                    rec.specificInstructions.push("Check INR on day -1; if >1.5, consider low-dose vitamin K (1-2mg PO)");
                    if (bridging) {
                        rec.specificInstructions.push(`Start LMWH (e.g., enoxaparin 1mg/kg SC q12h or dalteparin 100U/kg SC q12h) on day -3`);
                        rec.specificInstructions.push("Last dose of LMWH: 24 hours pre-procedure (morning of day -1)");
                        rec.specificInstructions.push("Resume warfarin 12-24 hours post-op when hemostasis secured");
                        rec.specificInstructions.push("Resume LMWH 48-72 hours post-op (when hemostasis secured) until INR therapeutic");
                    } else {
                        rec.specificInstructions.push("No bridging recommended per 2022 CHEST guidelines");
                        rec.specificInstructions.push("Resume warfarin 12-24 hours post-op when hemostasis secured");
                    }
                } else {
                    // DOAC management per PAUSE trial and 2024 guidelines
                    const holdDays = preopDays;
                    rec.specificInstructions.push(`Stop ${drug.name} ${holdDays} days before procedure`);
                    if (patientData.anticoagulant === 'dabigatran' && crcl && crcl < 30) {
                        rec.specificInstructions.push("Consider holding for additional 1-2 days due to CrCl <30");
                    }
                    rec.specificInstructions.push("No bridging with heparin (not recommended for DOACs)");
                    rec.specificInstructions.push(`Resume ${drug.name} ${rec.postopDays} after procedure when hemostasis secured and patient tolerating PO`);
                    if (patientData.bleedingRisk === 'high') {
                        rec.specificInstructions.push("Consider prophylactic-dose LMWH (e.g., enoxaparin 40mg daily) until DOAC resumed");
                    }
                }

                // Special cases
                if (patientData.procedure === 'dental') {
                    rec.specificInstructions.push("Dental specific: Can often continue DOAC or hold only day of procedure");
                    rec.specificInstructions.push("Consider tranexamic acid mouthwash (10mL of 5% solution) pre and post procedure");
                }

                setRecommendations(rec);
                setCurrentStep(5);
            };

            const StepIndicator = () => (
                <div className="flex justify-between mb-8 px-4">
                    {[1, 2, 3, 4, 5].map((step) => (
                        <div key={step} className={`step-indicator flex items-center justify-center w-10 h-10 rounded-full font-semibold text-sm ${currentStep >= step ? 'active' : 'bg-gray-200 text-gray-500'}`}>
                            {step}
                        </div>
                    ))}
                </div>
            );

            const Step1PatientInfo = () => (
                <div className="glass-panel rounded-2xl p-8 shadow-xl">
                    <h2 className="text-2xl font-bold mb-6 gradient-text">Step 1: Patient Characteristics</h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">Anticoagulant</label>
                            <select 
                                className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                value={patientData.anticoagulant}
                                onChange={(e) => updatePatientData('anticoagulant', e.target.value)}
                            >
                                <option value="">Select anticoagulant...</option>
                                <option value="warfarin">Warfarin (VKA)</option>
                                <option value="apixaban">Apixaban (Eliquis)</option>
                                <option value="rivaroxaban">Rivaroxaban (Xarelto)</option>
                                <option value="dabigatran">Dabigatran (Pradaxa)</option>
                                <option value="edoxaban">Edoxaban (Lixiana)</option>
                            </select>
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">Clinical Indication</label>
                            <select 
                                className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                value={patientData.indication}
                                onChange={(e) => updatePatientData('indication', e.target.value)}
                            >
                                <option value="">Select indication...</option>
                                <option value="afib">Atrial Fibrillation</option>
                                <option value="vte">DVT/PE (VTE)</option>
                                <option value="valve">Mechanical Heart Valve</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">Age</label>
                            <input 
                                type="number"
                                className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                value={patientData.age}
                                onChange={(e) => updatePatientData('age', e.target.value)}
                                placeholder="Years"
                            />
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">Weight (kg)</label>
                            <input 
                                type="number"
                                className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                value={patientData.weight}
                                onChange={(e) => updatePatientData('weight', e.target.value)}
                                placeholder="kg"
                            />
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">Serum Creatinine (mg/dL)</label>
                            <input 
                                type="number"
                                step="0.1"
                                className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                value={patientData.creatinine}
                                onChange={(e) => updatePatientData('creatinine', e.target.value)}
                                placeholder="mg/dL"
                            />
                        </div>

                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-2">Gender</label>
                            <select 
                                className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                value={patientData.gender}
                                onChange={(e) => updatePatientData('gender', e.target.value)}
                            >
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                    </div>

                    {patientData.indication === 'afib' && (
                        <div className="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                            <h3 className="font-semibold text-blue-900 mb-3">CHA₂DS₂-VASc Risk Factors</h3>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                {[
                                    { key: 'hypertension', label: 'Hypertension' },
                                    { key: 'diabetes', label: 'Diabetes' },
                                    { key: 'stroke', label: 'Prior Stroke/TIA' },
                                    { key: 'heartFailure', label: 'Heart Failure' },
                                    { key: 'vascular', label: 'Vascular Disease' }
                                ].map(({ key, label }) => (
                                    <label key={key} className="flex items-center space-x-2 cursor-pointer">
                                        <input 
                                            type="checkbox"
                                            checked={patientData[key]}
                                            onChange={(e) => updatePatientData(key, e.target.checked)}
                                            className="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500"
                                        />
                                        <span className="text-sm text-gray-700">{label}</span>
                                    </label>
                                ))}
                            </div>
                        </div>
                    )}

                    {patientData.indication === 'vte' && (
                        <div className="mt-6 p-4 bg-purple-50 rounded-lg border border-purple-200">
                            <h3 className="font-semibold text-purple-900 mb-3">VTE Timing</h3>
                            <select 
                                className="w-full p-3 border border-gray-300 rounded-lg"
                                value={patientData.vteTime}
                                onChange={(e) => updatePatientData('vteTime', e.target.value)}
                            >
                                <option value="">Select time since diagnosis...</option>
                                <option value="<3months">&lt;3 months (High Risk)</option>
                                <option value="3-12months">3-12 months (Moderate Risk)</option>
                                <option value=">12months">&gt;12 months (Low Risk)</option>
                            </select>
                        </div>
                    )}

                    {patientData.indication === 'valve' && (
                        <div className="mt-6 p-4 bg-red-50 rounded-lg border border-red-200">
                            <h3 className="font-semibold text-red-900 mb-3">Valve Type</h3>
                            <select 
                                className="w-full p-3 border border-gray-300 rounded-lg"
                                value={patientData.valveType}
                                onChange={(e) => updatePatientData('valveType', e.target.value)}
                            >
                                <option value="">Select valve type...</option>
                                <option value="mitral">Mitral (High Risk - Bridging Recommended)</option>
                                <option value="aorticOld">Aortic - Ball-cage (High Risk)</option>
                                <option value="aorticModern">Aortic - Bileaflet without AF (Moderate Risk)</option>
                            </select>
                        </div>
                    )}

                    <div className="mt-8 flex justify-end">
                        <button 
                            onClick={() => setCurrentStep(2)}
                            className="btn-primary text-white px-8 py-3 rounded-lg font-semibold flex items-center gap-2"
                            disabled={!patientData.anticoagulant || !patientData.indication}
                        >
                            Next Step <span className="text-lg">→</span>
                        </button>
                    </div>
                </div>
            );

            const Step2ProcedureRisk = () => (
                <div className="glass-panel rounded-2xl p-8 shadow-xl">
                    <h2 className="text-2xl font-bold mb-6 gradient-text">Step 2: Estimate Bleeding Risk</h2>
                    
                    <div className="mb-6">
                        <label className="block text-sm font-medium text-gray-700 mb-3">Procedure Category</label>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {[
                                { key: 'minimal', label: 'Minimal Bleeding Risk', color: 'green', examples: bleedingRiskProcedures.minimal },
                                { key: 'low', label: 'Low-Moderate Bleeding Risk', color: 'yellow', examples: bleedingRiskProcedures.low },
                                { key: 'high', label: 'High Bleeding Risk', color: 'red', examples: bleedingRiskProcedures.high }
                            ].map(({ key, label, color, examples }) => (
                                <div 
                                    key={key}
                                    onClick={() => updatePatientData('bleedingRisk', key)}
                                    className={`cursor-pointer p-4 rounded-xl border-2 transition-all ${patientData.bleedingRisk === key ? `border-${color}-500 bg-${color}-50` : 'border-gray-200 hover:border-gray-300'}`}
                                >
                                    <div className={`w-4 h-4 rounded-full bg-${color}-500 mb-2`}></div>
                                    <h3 className="font-semibold mb-2">{label}</h3>
                                    <ul className="text-xs text-gray-600 space-y-1">
                                        {examples.slice(0, 3).map((ex, i) => (
                                            <li key={i}>• {ex}</li>
                                        ))}
                                        <li className="text-gray-400">+ {examples.length - 3} more...</li>
                                    </ul>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                        <label className="flex items-center space-x-3 cursor-pointer">
                            <input 
                                type="checkbox"
                                checked={patientData.neuraxial}
                                onChange={(e) => updatePatientData('neuraxial', e.target.checked)}
                                className="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500"
                            />
                            <div>
                                <span className="font-medium text-gray-900">Neuraxial Anesthesia/Procedure</span>
                                <p className="text-sm text-gray-500">Spinal/epidural anesthesia or spinal surgery (requires longer interruption)</p>
                            </div>
                        </label>
                    </div>

                    <div className="mb-6">
                        <label className="block text-sm font-medium text-gray-700 mb-3">Procedure Urgency</label>
                        <div className="flex gap-4">
                            {['elective', 'urgent', 'emergent'].map((urgency) => (
                                <button
                                    key={urgency}
                                    onClick={() => updatePatientData('procedureUrgency', urgency)}
                                    className={`px-6 py-3 rounded-lg font-medium capitalize transition-all ${patientData.procedureUrgency === urgency ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}
                                >
                                    {urgency}
                                </button>
                            ))}
                        </div>
                    </div>

                    {patientData.procedureUrgency !== 'elective' && (
                        <div className="p-4 bg-red-50 border border-red-200 rounded-lg mb-6">
                            <div className="flex items-start gap-3">
                                <AlertIcon />
                                <div>
                                    <h3 className="font-semibold text-red-900">Urgent/Emergent Procedure</h3>
                                    <p className="text-sm text-red-700 mt-1">
                                        For urgent/emergent procedures, consider reversal agents if recent DOAC dose:
                                        <br/>• Andexanet alfa (Factor Xa inhibitors)
                                        <br/>• Idarucizumab (Dabigatran)
                                        <br/>• 4-factor PCC (all DOACs)
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between mt-8">
                        <button 
                            onClick={() => setCurrentStep(1)}
                            className="px-6 py-3 text-gray-600 hover:text-gray-800 font-medium"
                        >
                            ← Back
                        </button>
                        <button 
                            onClick={() => setCurrentStep(3)}
                            className="btn-primary text-white px-8 py-3 rounded-lg font-semibold"
                            disabled={!patientData.bleedingRisk}
                        >
                            Next Step →
                        </button>
                    </div>
                </div>
            );

            const Step3Review = () => {
                const chads = calculateCHA2DS2VASc();
                const crcl = calculateCockcroftGault();
                
                return (
                    <div className="glass-panel rounded-2xl p-8 shadow-xl">
                        <h2 className="text-2xl font-bold mb-6 gradient-text">Step 3: Review Risk Assessment</h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                <h3 className="font-semibold text-gray-900 mb-4 flex items-center gap-2">
                                    <HeartIcon /> Thromboembolic Risk
                                </h3>
                                {patientData.indication === 'afib' && (
                                    <div className="space-y-2">
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">CHA₂DS₂-VASc Score:</span>
                                            <span className="font-bold text-2xl text-indigo-600">{chads}</span>
                                        </div>
                                        <div className="text-sm text-gray-500">
                                            {chads === 0 ? 'Low Risk' : chads <= 2 ? 'Moderate Risk' : 'High Risk'}
                                        </div>
                                    </div>
                                )}
                                {patientData.indication === 'vte' && (
                                    <div className="space-y-2">
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">Time since event:</span>
                                            <span className="font-semibold">{patientData.vteTime}</span>
                                        </div>
                                        <div className="text-sm text-gray-500">
                                            {patientData.vteTime === '<3months' ? 'High Risk - Consider delaying surgery' : 'Moderate/Low Risk'}
                                        </div>
                                    </div>
                                )}
                                {patientData.indication === 'valve' && (
                                    <div className="space-y-2">
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">Valve Type:</span>
                                            <span className="font-semibold">{patientData.valveType}</span>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                <h3 className="font-semibold text-gray-900 mb-4 flex items-center gap-2">
                                    <AlertIcon /> Bleeding Risk
                                </h3>
                                <div className="space-y-2">
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">Procedure Risk:</span>
                                        <span className={`font-semibold capitalize ${patientData.bleedingRisk === 'high' ? 'text-red-600' : patientData.bleedingRisk === 'minimal' ? 'text-green-600' : 'text-yellow-600'}`}>
                                            {patientData.bleedingRisk}
                                        </span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">Neuraxial:</span>
                                        <span className="font-semibold">{patientData.neuraxial ? 'Yes (+2 days hold)' : 'No'}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">Urgency:</span>
                                        <span className="font-semibold capitalize">{patientData.procedureUrgency}</span>
                                    </div>
                                </div>
                            </div>

                            {crcl && (
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                    <h3 className="font-semibold text-gray-900 mb-4 flex items-center gap-2">
                                        <PillIcon /> Renal Function
                                    </h3>
                                    <div className="space-y-2">
                                        <div className="flex justify-between">
                                            <span className="text-gray-600">CrCl:</span>
                                            <span className="font-bold text-2xl text-indigo-600">{crcl} mL/min</span>
                                        </div>
                                        <div className="text-sm text-gray-500">
                                            {crcl >= 60 ? 'Normal' : crcl >= 30 ? 'Moderate impairment' : 'Severe impairment - Dose adjustment needed'}
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                <h3 className="font-semibold text-gray-900 mb-4 flex items-center gap-2">
                                    <ClockIcon /> Anticoagulant
                                </h3>
                                <div className="space-y-2">
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">Drug:</span>
                                        <span className="font-semibold">{anticoagulants[patientData.anticoagulant]?.name}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">Half-life:</span>
                                        <span className="font-semibold text-sm">{anticoagulants[patientData.anticoagulant]?.halfLife}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="flex justify-between mt-8">
                            <button 
                                onClick={() => setCurrentStep(2)}
                                className="px-6 py-3 text-gray-600 hover:text-gray-800 font-medium"
                            >
                                ← Back
                            </button>
                            <button 
                                onClick={generateRecommendations}
                                className="btn-primary text-white px-8 py-3 rounded-lg font-semibold shadow-lg"
                            >
                                Generate Management Plan →
                            </button>
                        </div>
                    </div>
                );
            };

            const Step4Recommendations = () => {
                if (!recommendations) return null;
                
                return (
                    <div className="glass-panel rounded-2xl p-8 shadow-xl">
                        <h2 className="text-2xl font-bold mb-6 gradient-text">Perioperative Management Plan</h2>
                        
                        <div className="mb-6 p-4 bg-indigo-50 border border-indigo-200 rounded-lg">
                            <div className="flex items-center justify-between mb-2">
                                <span className="font-semibold text-indigo-900">Thromboembolic Risk:</span>
                                <span className={`px-3 py-1 rounded-full text-sm font-semibold ${
                                    recommendations.thromboembolicRisk === 'high' ? 'bg-red-100 text-red-800' :
                                    recommendations.thromboembolicRisk === 'moderate' ? 'bg-yellow-100 text-yellow-800' :
                                    'bg-green-100 text-green-800'
                                }`}>
                                    {recommendations.thromboembolicRisk.toUpperCase()}
                                </span>
                            </div>
                            <div className="flex items-center justify-between">
                                <span className="font-semibold text-indigo-900">Bridging Recommended:</span>
                                <span className={`px-3 py-1 rounded-full text-sm font-semibold ${recommendations.bridging ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}`}>
                                    {recommendations.bridging ? 'YES' : 'NO'}
                                </span>
                            </div>
                        </div>

                        {recommendations.delayRecommended && (
                            <div className="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg flex items-start gap-3">
                                <AlertIcon />
                                <div>
                                    <h3 className="font-semibold text-red-900">Consider Delaying Surgery</h3>
                                    <p className="text-sm text-red-700 mt-1">
                                        Recent VTE (&lt;3 months) carries high recurrence risk. If elective, consider delaying 3+ months if possible.
                                    </p>
                                </div>
                            </div>
                        )}

                        <div className="space-y-6">
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                <div className="bg-gray-50 px-6 py-4 border-b border-gray-200">
                                    <h3 className="font-semibold text-gray-900 flex items-center gap-2">
                                        <ClockIcon /> Preoperative Management
                                    </h3>
                                </div>
                                <div className="p-6">
                                    <div className="space-y-4">
                                        {recommendations.specificInstructions.filter(i => i.includes('Stop') || i.includes('Start') || i.includes('Check')).map((instruction, idx) => (
                                            <div key={idx} className="timeline-item text-gray-700">
                                                {instruction}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                <div className="bg-gray-50 px-6 py-4 border-b border-gray-200">
                                    <h3 className="font-semibold text-gray-900 flex items-center gap-2">
                                        <CheckIcon /> Postoperative Management
                                    </h3>
                                </div>
                                <div className="p-6">
                                    <div className="space-y-4">
                                        {recommendations.specificInstructions.filter(i => i.includes('Resume') || i.includes('post') || i.includes('prophylactic')).map((instruction, idx) => (
                                            <div key={idx} className="timeline-item text-gray-700">
                                                {instruction}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="bg-yellow-50 rounded-xl border border-yellow-200 p-6">
                                <h3 className="font-semibold text-yellow-900 mb-3">Important Considerations</h3>
                                <ul className="space-y-2 text-sm text-yellow-800">
                                    <li>• Ensure adequate hemostasis before resuming anticoagulation</li>
                                    <li>• Coordinate with surgeon regarding bleeding risk</li>
                                    <li>• Consider prophylactic LMWH for high bleeding risk procedures until DOAC resumed</li>
                                    <li>• Monitor for signs of thrombosis (new swelling, pain, neurological changes)</li>
                                    {patientData.neuraxial && (
                                        <li className="font-semibold">• Neuraxial: Ensure 5 half-lives elapsed before catheter removal; restart DOAC 6 hours after catheter removal</li>
                                    )}
                                </ul>
                            </div>
                        </div>

                        <div className="mt-8 flex justify-between">
                            <button 
                                onClick={() => setCurrentStep(3)}
                                className="px-6 py-3 text-gray-600 hover:text-gray-800 font-medium"
                            >
                                ← Back
                            </button>
                            <button 
                                onClick={() => {
                                    setCurrentStep(1);
                                    setPatientData({
                                        anticoagulant: '',
                                        indication: '',
                                        age: '',
                                        weight: '',
                                        creatinine: '',
                                        gender: 'male',
                                        hypertension: false,
                                        diabetes: false,
                                        stroke: false,
                                        heartFailure: false,
                                        vascular: false,
                                        vteTime: '',
                                        valveType: '',
                                        procedure: '',
                                        procedureUrgency: 'elective',
                                        bleedingRisk: '',
                                        neuraxial: false
                                    });
                                    setRecommendations(null);
                                }}
                                className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300"
                            >
                                New Patient
                            </button>
                        </div>
                    </div>
                );
            };

            const GuidelinesReference = () => (
                <div className="mt-8 glass-panel rounded-2xl p-6 shadow-lg">
                    <h3 className="font-semibold text-gray-900 mb-4">Evidence-Based Guidelines (2024-2025)</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-gray-600">
                        <div className="space-y-2">
                            <p className="font-medium text-gray-900">Key References:</p>
                            <ul className="space-y-1 list-disc list-inside">
                                <li>2024 AHA/ACC/ACS Guideline for Perioperative Cardiovascular Management</li>
                                <li>2022 CHEST Guideline: Perioperative Management of Antithrombotic Therapy</li>
                                <li>PAUSE Trial (Perioperative Anticoagulation Use for Surgery Evaluation)</li>
                                <li>PERIOP-2 Trial (Bridging in High Risk Patients)</li>
                                <li>BRIDGE Trial (Atrial Fibrillation Bridging)</li>
                            </ul>
                        </div>
                        <div className="space-y-2">
                            <p className="font-medium text-gray-900">Key Principles:</p>
                            <ul className="space-y-1 list-disc list-inside">
                                <li>No bridging for DOACs (rapid offset/onset)</li>
                                <li>No bridging for most AF patients on warfarin</li>
                                <li>Bridging only for mechanical mitral valves, AF with recent stroke, or recent VTE</li>
                                <li>Time-based interruption (3-5 half-lives) preferred over lab monitoring</li>
                                <li>Resume warfarin 12-24h post-op; DOACs 24-72h based on bleeding risk</li>
                            </ul>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="container mx-auto px-4 py-8 max-w-4xl">
                    <header className="text-center mb-10">
                        <h1 className="text-4xl font-bold text-white mb-2 drop-shadow-lg">Perioperative Anticoagulation Manager</h1>
                        <p className="text-white/90 text-lg">Clinical decision support for surgical anticoagulation management</p>
                        <div className="mt-4 inline-flex items-center gap-2 px-4 py-2 bg-white/20 backdrop-blur rounded-full text-white text-sm">
                            <span className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                            Based on 2024 AHA/ACC & 2022 CHEST Guidelines
                        </div>
                    </header>

                    <StepIndicator />

                    <div className="transition-all duration-300">
                        {currentStep === 1 && <Step1PatientInfo />}
                        {currentStep === 2 && <Step2ProcedureRisk />}
                        {currentStep === 3 && <Step3Review />}
                        {currentStep === 5 && <Step4Recommendations />}
                    </div>

                    <GuidelinesReference />

                    <footer className="mt-12 text-center text-white/70 text-sm">
                        <p className="mb-2">For clinical decision support only. Always verify with institutional protocols.</p>
                        <p>© 2025 Perioperative Anticoagulation Manager | Ready for GitHub & Vercel Deployment</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
